<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"DM Sans",sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 20px; position:relative; overflow:hidden; background:#C8A87A; }
.bg-svg { position:fixed; inset:0; z-index:0; width:100%; height:100%; }
.content { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; width:100%; max-width:400px; }
.logo-wrap { text-align:center; margin-bottom:26px; }
.logo-img { width:92px; height:92px; border-radius:50%; overflow:hidden; border:3px solid #8C6A30; margin:0 auto 13px; box-shadow:0 0 0 5px rgba(140,106,48,0.2), 0 8px 32px rgba(0,0,0,0.2); }
.logo-img img { width:100%; height:100%; object-fit:cover; }
.brand { font-family:"Satisfy",cursive; font-size:34px; color:#3A2008; text-shadow:0 1px 6px rgba(255,255,255,0.3); }
.tagline { font-size:11px; color:rgba(58,32,8,0.55); margin-top:5px; letter-spacing:2.5px; text-transform:uppercase; }
.card { background:rgba(255,252,240,0.96); border-radius:26px; padding:28px 22px; width:100%; box-shadow:0 20px 60px rgba(90,50,10,0.25), 0 1px 0 rgba(255,255,255,0.6) inset; position:relative; overflow:hidden; }
.card::before { content:""; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,#B85C2A,#C8A050,#4A6A2A,#C8A050,#B85C2A); background-size:200% 100%; animation:shimmer 5s linear infinite; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.card-title { font-family:"Playfair Display",serif; font-size:21px; font-weight:800; color:#2A1A08; text-align:center; margin-bottom:4px; }
.card-sub { font-size:12px; color:#7A5A38; text-align:center; margin-bottom:22px; line-height:1.6; }
.role-btn { display:flex; align-items:center; gap:13px; width:100%; padding:14px 15px; margin-bottom:9px; background:#FFFFFF; border:1.5px solid rgba(90,50,10,0.1); border-radius:14px; cursor:pointer; text-decoration:none; transition:all 0.2s; font-family:"DM Sans",sans-serif; }
.role-btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(90,50,10,0.12); }
.btn-shopper:hover { border-color:#4A6A2A; background:#F5FAF3; }
.btn-producer:hover { border-color:#B85C2A; background:#FDF7F3; }
.btn-admin:hover { border-color:#8C6A30; background:#FBF7F1; }
.role-btn:last-of-type { margin-bottom:0; }
.role-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.icon-shopper { background:linear-gradient(135deg,#E8F4E0,#C8DCA8); }
.icon-producer { background:linear-gradient(135deg,#FDE8CC,#F5C48A); }
.icon-admin { background:linear-gradient(135deg,#EDE0CC,#D5C0A0); }
.role-label { font-size:14px; font-weight:700; color:#2A1A08; }
.role-desc { font-size:11px; color:#7A5A38; margin-top:2px; }
.role-arrow { margin-left:auto; font-size:18px; color:#C8A878; flex-shrink:0; }
.divider { display:flex; align-items:center; gap:10px; margin:9px 0 8px; color:#C8A878; font-size:11px; letter-spacing:1px; }
.divider::before, .divider::after { content:""; flex:1; height:1px; background:rgba(90,50,10,0.08); }
.footer { margin-top:16px; font-size:11px; color:rgba(58,32,8,0.35); text-align:center; }
</style>
</head>

<script>
const API = window.location.origin;
const DEMO = {
  shopper: {email: 'shopper@fromourplace.demo', password: 'Demo2026!', dest: '/static/app.html', token: 'fop_token', user: 'fop_user'},
  producer: {email: 'producer@fromourplace.demo', password: 'Demo2026!', dest: '/static/producer.html', token: 'fop_producer_token', user: 'fop_producer_user'},
};
async function demoLogin(role) {
  const arrow = document.getElementById('arr-' + role);
  if (arrow) arrow.textContent = '...';
  const d = DEMO[role];
  try {
    const res = await fetch(API + '/api/users/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:d.email, password:d.password})});
    const data = await res.json();
    if (!res.ok) { alert('Demo login failed'); if(arrow) arrow.textContent = String.fromCharCode(0x203A); return; }
    localStorage.setItem(d.token, data.token);
    localStorage.setItem(d.user, JSON.stringify({id:data.user_id, role:data.role, full_name:data.full_name}));
    window.location.href = d.dest;
  } catch(e) { window.location.href = d.dest; }
}
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/static/sw.js'));
}
</script>
