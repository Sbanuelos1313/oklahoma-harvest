.container{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:44px 24px 110px;
  width:100%;
  max-width:400px;
}
.logo-wrap{
  width:100px;
  height:100px;
  border-radius:50%;
  overflow:hidden;
  border:3px solid #8C6030;
  box-shadow:0 6px 28px rgba(74,48,16,0.28);
  margin-bottom:18px;
}
.logo-wrap img{width:100%;height:100%;object-fit:cover;}
.brand{
  font-family:'Georgia',serif;
  font-size:30px;
  font-weight:700;
  color:#2A1A08;
  letter-spacing:0.5px;
  margin-bottom:5px;
  text-align:center;
  text-shadow:0 1px 3px rgba(255,255,255,0.3);
}
.tagline{
  font-size:11px;
  color:rgba(42,26,8,0.55);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:36px;
  text-align:center;
}
.card{
  background:rgba(255,252,240,0.96);
  border-radius:22px;
  padding:28px 20px;
  width:100%;
  box-shadow:0 16px 48px rgba(74,48,16,0.22);
}
.btn{
  display:flex;
  align-items:center;
  gap:12px;
  width:100%;
  padding:15px 16px;
  border-radius:14px;
  border:1.5px solid rgba(74,48,16,0.1);
  cursor:pointer;
  text-decoration:none;
  margin-bottom:10px;
  background:#FFFFFF;
  transition:transform 0.15s,box-shadow 0.15s;
  font-family:'Georgia',serif;
}
.btn:last-of-type{margin-bottom:0;}
.btn:active{transform:scale(0.97);}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(74,48,16,0.13);}
.btn-shop:hover{border-color:#4A6741;background:#F6FAF4;}
.btn-sell:hover{border-color:#B85C2A;background:#FDF7F3;}
.btn-admin:hover{border-color:#8C6030;background:#FBF7F1;}
.btn-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.icon-shop{background:linear-gradient(135deg,#E8F4E0,#C8DCA8);}
.icon-sell{background:linear-gradient(135deg,#FDE8CC,#F5C48A);}
.icon-admin{background:linear-gradient(135deg,#EDE0CC,#D5C0A0);}
.btn-label{font-size:14px;font-weight:700;color:#2A1A08;}
.btn-desc{font-size:11px;color:#7A5A38;margin-top:2px;}
.btn-arrow{margin-left:auto;font-size:18px;color:#C8A878;flex-shrink:0;}
.divider{
  display:flex;align-items:center;gap:10px;
  margin:8px 0;color:#C8A878;font-size:11px;letter-spacing:1px;
}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(74,48,16,0.08);}
.feedback{
  position:fixed;bottom:20px;right:18px;z-index:99;
  display:flex;align-items:center;gap:6px;
  background:#4A6741;color:white;
  padding:10px 16px;border-radius:20px;
  text-decoration:none;font-family:'Georgia',serif;
  font-size:12px;font-weight:700;
  box-shadow:0 4px 16px rgba(0,0,0,0.2);
}
</style>
</head>
