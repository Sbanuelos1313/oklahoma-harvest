<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5F9F4"/>
      <stop offset="100%" stop-color="#EDF4EC"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg)" stroke="#4A6741" stroke-width="1.5"/>
  
  <!-- Roof -->
  <path d="M18 46 Q50 26 82 46 Z" fill="#4A6741"/>
  <path d="M18 46 Q22 50 26 46 Q30 50 34 46 Q38 50 42 46 Q46 50 50 46 Q54 50 58 46 Q62 50 66 46 Q70 50 74 46 Q78 50 82 46" fill="#6B9266"/>

  <!-- Chimney -->
  <rect x="60" y="30" width="7" height="14" rx="2" fill="#B85C2A"/>
  <rect x="58" y="28" width="11" height="4" rx="1" fill="#D4843C"/>
  <circle cx="63" cy="24" r="3" fill="white" opacity="0.6"/>
  <circle cx="65" cy="20" r="2" fill="white" opacity="0.4"/>

  <!-- Store front -->
  <rect x="20" y="46" width="60" height="34" rx="3" fill="#FAF5EC" stroke="#4A6741" stroke-width="1.5"/>
  
  <!-- Hanging sign post -->
  <line x1="50" y1="30" x2="50" y2="38" stroke="#4A2C17" stroke-width="1.5"/>
  <line x1="42" y1="38" x2="58" y2="38" stroke="#4A2C17" stroke-width="1.5"/>
  <rect x="34" y="38" width="32" height="10" rx="3" fill="#FAF5EC" stroke="#4A2C17" stroke-width="1.5"/>
  <text x="50" y="46" text-anchor="middle" font-family="Georgia,serif" font-size="5.5" fill="#2D1A0E" font-style="italic">Our Place</text>

  <!-- Door (arched) -->
  <path d="M41 80 L41 65 Q50 58 59 65 L59 80 Z" fill="#C8DBC5" stroke="#4A6741" stroke-width="1.5"/>
  <circle cx="56" cy="72" r="1.5" fill="#4A6741"/>
  <path d="M47 66 Q47 63 50 65 Q53 63 53 66 Q53 69 50 71 Q47 69 47 66 Z" fill="#B85C2A" opacity="0.8"/>

  <!-- Windows -->
  <rect x="23" y="52" width="14" height="11" rx="3" fill="#C8DBC5" stroke="#4A6741" stroke-width="1.5"/>
  <line x1="30" y1="52" x2="30" y2="63" stroke="#4A6741" stroke-width="1"/>
  <line x1="23" y1="57" x2="37" y2="57" stroke="#4A6741" stroke-width="1"/>

  <rect x="63" y="52" width="14" height="11" rx="3" fill="#C8DBC5" stroke="#4A6741" stroke-width="1.5"/>
  <line x1="70" y1="52" x2="70" y2="63" stroke="#4A6741" stroke-width="1"/>
  <line x1="63" y1="57" x2="77" y2="57" stroke="#4A6741" stroke-width="1"/>

  <!-- Flower beds under windows -->
  <!-- Left flower bed -->
  <rect x="21" y="74" width="18" height="4" rx="2" fill="#B85C2A"/>
  <!-- Left flowers -->
  <line x1="24" y1="74" x2="24" y2="68" stroke="#4A6741" stroke-width="1.2"/>
  <circle cx="24" cy="67" r="2.5" fill="#D4843C"/>
  <circle cx="24" cy="67" r="1.2" fill="#FAF5EC"/>
  <line x1="28" y1="74" x2="28" y2="66" stroke="#4A6741" stroke-width="1.2"/>
  <circle cx="28" cy="65" r="2.5" fill="#B85C2A"/>
  <circle cx="28" cy="65" r="1.2" fill="#FAF5EC"/>
  <line x1="32" y1="74" x2="32" y2="68" stroke="#4A6741" stroke-width="1.2"/>
  <circle cx="32" cy="67" r="2.5" fill="#E8B86D"/>
  <circle cx="32" cy="67" r="1.2" fill="#FAF5EC"/>
  <!-- Left leaves -->
  <ellipse cx="22" cy="71" rx="2" ry="1" fill="#6B9266" transform="rotate(-30,22,71)"/>
  <ellipse cx="36" cy="71" rx="2" ry="1" fill="#6B9266" transform="rotate(30,36,71)"/>

  <!-- Right flower bed -->
  <rect x="61" y="74" width="18" height="4" rx="2" fill="#B85C2A"/>
  <!-- Right flowers -->
  <line x1="64" y1="74" x2="64" y2="68" stroke="#4A6741" stroke-width="1.2"/>
  <circle cx="64" cy="67" r="2.5" fill="#E8B86D"/>
  <circle cx="64" cy="67" r="1.2" fill="#FAF5EC"/>
  <line x1="68" y1="74" x2="68" y2="66" stroke="#4A6741" stroke-width="1.2"/>
  <circle cx="68" cy="65" r="2.5" fill="#D4843C"/>
  <circle cx="68" cy="65" r="1.2" fill="#FAF5EC"/>
  <line x1="72" y1="74" x2="72" y2="68" stroke="#4A6741" stroke-width="1.2"/>
  <circle cx="72" cy="67" r="2.5" fill="#B85C2A"/>
  <circle cx="72" cy="67" r="1.2" fill="#FAF5EC"/>
  <!-- Right leaves -->
  <ellipse cx="62" cy="71" rx="2" ry="1" fill="#6B9266" transform="rotate(-30,62,71)"/>
  <ellipse cx="78" cy="71" rx="2" ry="1" fill="#6B9266" transform="rotate(30,78,71)"/>

  <!-- Stepping stones -->
  <ellipse cx="50" cy="83" rx="5" ry="2" fill="#E8B86D" opacity="0.5"/>
  <ellipse cx="50" cy="87" rx="4" ry="1.5" fill="#E8B86D" opacity="0.3"/>
</svg>
